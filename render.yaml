# render.yaml — Infrastructure as Code for Render
databases:
  - name: splitwiser-db
    plan: free
    databaseName: splitwiser
    user: splitwiser

services:
  - type: web
    name: splitwiser
    plan: free
    runtime: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: splitwiser-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false # You'll set this manually in Render dashboard
      - key: PORT
        value: 8080
